<!DOCTYPE html><html><head><style>body{background:#000; overflow:hidden;} #container{position:relative; width:600px; height:800px; margin:0 auto; perspective: 800px;} #bg-canvas{position:absolute; width:600px; height:1200px; top:-200px; left:0; transform: rotateX(60deg); transform-origin: center bottom; background: green;} #sprite-canvas{position:absolute; width:600px; height:800px; top:0; left:0; pointer-events:none;}</style></head><body><div id="container"><canvas id="bg-canvas" width="600" height="1200"></canvas><canvas id="sprite-canvas" width="600" height="800"></canvas></div><script>const bg=document.getElementById("bg-canvas").getContext("2d"); bg.fillStyle="#4CAF50"; bg.fillRect(0,0,600,1200); bg.fillStyle="#111"; bg.fillRect(150,0,300,1200); bg.fillStyle="#FFF"; for(let y=0;y<1200;y+=40){if((y/40)%2===0){bg.fillRect(140,y,15,40); bg.fillRect(445,y,15,40);}} const sp=document.getElementById("sprite-canvas").getContext("2d"); sp.fillStyle="red"; sp.fillRect(280, 650, 40, 80);</script></body></html>
