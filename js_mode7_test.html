<!DOCTYPE html><html><head><style>body{background:#000; overflow:hidden;}</style></head><body><canvas id="c" width="600" height="800"></canvas><script>const ctx=document.getElementById("c").getContext("2d"); function p3d(wx, wy) { let dist=800-wy; if(dist<0)dist=0; let scale=600/(600+dist); let sx=300+(wx-300)*scale; let sy=800-(Math.pow(dist, 0.85)*1.5); return {x:sx, y:sy, s:scale*1.2}; } ctx.fillStyle="#4CAF50"; ctx.fillRect(0,400,600,400); ctx.fillStyle="#1a1a1a"; ctx.beginPath(); for(let y=-800; y<=800; y+=20) { let off=Math.sin(y*0.005)*50; let pt=p3d(150+off, y); if(y===-800) ctx.moveTo(pt.x,pt.y); else ctx.lineTo(pt.x,pt.y); } for(let y=800; y>=-800; y-=20){ let off=Math.sin(y*0.005)*50; let pt=p3d(450+off, y); ctx.lineTo(pt.x,pt.y); } ctx.fill(); for(let y=-800;y<=800;y+=40){ let off=Math.sin(y*0.005)*50; ctx.fillStyle="#fff"; let pt1=p3d(140+off, y); let pt2=p3d(140+off, y+20); ctx.beginPath(); ctx.moveTo(pt1.x,pt1.y); ctx.lineTo(pt2.x,pt2.y); ctx.lineTo(pt2.x+15*pt2.s, pt2.y); ctx.lineTo(pt1.x+15*pt1.s, pt1.y); ctx.fill();} </script></body></html>
